<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    --bg-sidebar: #060608; --bg-base: #0a0a0b; --bg-elevated: #111113;
    --border: #1e1e22; --border-hover: #2a2a30;
    --text-muted: #555; --text-secondary: #888; --text-primary: #c8c8c8; --text-bright: #e8e8e8;
    --accent: #7F77DD;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    --font-sans: ui-sans-serif, system-ui, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg-base); font-family: var(--font-sans); font-size: 13px; display: flex; height: 100vh; }
  nav {
    width: 160px; min-width: 160px; background: var(--bg-sidebar);
    border-right: 0.5px solid var(--border);
    display: flex; flex-direction: column; height: 100%; flex-shrink: 0;
  }
  .logo {
    padding: 16px 14px 14px; font-size: 15px; font-weight: 500;
    font-family: var(--font-mono); color: var(--text-bright); letter-spacing: -.02em;
  }
  .logo span { color: var(--accent); }
  .divider { height: 0.5px; background: var(--border); margin: 6px 14px; }
  .nav-item {
    display: block; padding: 7px 14px 7px 16px; font-size: 11px;
    font-family: var(--font-mono); letter-spacing: .06em; color: var(--text-muted);
    border-left: 2px solid transparent; text-decoration: none;
  }
  .nav-item.active { color: var(--text-bright); border-left-color: var(--accent); padding-left: 12px; }
  .nav-item.disabled { color: var(--border-hover); }
  .soon { margin-left: 6px; font-size: 9px; font-family: var(--font-sans); color: var(--border-hover); }
  .spacer { flex: 1; }
  .main { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 12px; }
</style>
</head>
<body>
<nav>
  <div class="logo">bench<span>Y</span></div>
  <div class="divider"></div>
  <a class="nav-item active">Тест</a>
  <div class="divider"></div>
  <div class="nav-item disabled">Дашборд<span class="soon">soon</span></div>
  <a class="nav-item">История</a>
  <div class="divider"></div>
  <div class="nav-item disabled">Модели<span class="soon">soon</span></div>
  <a class="nav-item">Провайдеры</a>
  <div class="divider"></div>
  <div class="nav-item disabled">Датасеты<span class="soon">soon</span></div>
  <div class="spacer"></div>
  <div class="divider"></div>
  <a class="nav-item">Настройки</a>
</nav>
<div class="main">← Sidebar / 160px</div>
</body>
</html>
