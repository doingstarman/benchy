<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    --bg-base: #0a0a0b; --bg-elevated: #111113; --border: #1e1e22; --border-hover: #2a2a30;
    --text-muted: #555; --accent: #7F77DD; --accent-dim: #3a3470; --accent-bg: #1e1a3a;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    --font-sans: ui-sans-serif, system-ui, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg-base); font-family: var(--font-sans); font-size: 13px; padding: 32px 24px; display: flex; flex-direction: column; gap: 24px; }
  h2 { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); margin-bottom: 10px; }
  .row { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 11px; border-radius: 20px; cursor: pointer;
    font-size: 12px; font-family: var(--font-mono);
  }
  .chip-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .chip-default { border: 0.5px solid var(--border); background: var(--bg-elevated); color: var(--text-muted); }
  .chip-default .chip-dot { background: var(--border-hover); }
  .chip-active { border: 0.5px solid var(--accent-dim); background: var(--accent-bg); color: var(--accent); }
  .chip-active .chip-dot { background: var(--accent); }
  .chip-add { border: 0.5px dashed var(--border); background: transparent; color: var(--border-hover); }
</style>
</head>
<body>
<div>
  <h2>Model chips — default &amp; active</h2>
  <div class="row">
    <button class="chip chip-active"><span class="chip-dot"></span>gpt-4o</button>
    <button class="chip chip-default"><span class="chip-dot"></span>gpt-4o-mini</button>
    <button class="chip chip-default"><span class="chip-dot"></span>claude-3-5-sonnet</button>
    <button class="chip chip-default"><span class="chip-dot"></span>claude-3-haiku</button>
    <button class="chip chip-active"><span class="chip-dot"></span>llama-3.3-70b</button>
    <button class="chip chip-default"><span class="chip-dot"></span>llama-3.1-8b</button>
    <button class="chip chip-default"><span class="chip-dot"></span>gemini-2.5-flash</button>
    <button class="chip chip-default"><span class="chip-dot"></span>gemini-2.5-pro</button>
    <button class="chip chip-default"><span class="chip-dot"></span>deepseek-chat</button>
    <button class="chip chip-add">+ add</button>
  </div>
</div>
<div>
  <h2>Multi-select (3 active)</h2>
  <div class="row">
    <button class="chip chip-active"><span class="chip-dot"></span>gpt-4o</button>
    <button class="chip chip-active"><span class="chip-dot"></span>claude-3-5-sonnet</button>
    <button class="chip chip-active"><span class="chip-dot"></span>gemini-2.5-pro</button>
    <button class="chip chip-default"><span class="chip-dot"></span>gpt-4o-mini</button>
    <button class="chip chip-default"><span class="chip-dot"></span>llama-3.3-70b</button>
    <button class="chip chip-add">+ add</button>
  </div>
</div>
</body>
</html>
